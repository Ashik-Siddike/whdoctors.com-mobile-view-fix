<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subscribe to Newsletter</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.9.0/css/all.css" integrity="sha384-i1LQnF23gykqWXg6jxC2ZbCbUMxyw5gLZY6UiUS98LYV5unm8GWmfkIS6jqJfb4E" crossorigin="anonymous">

    <style>
        body {
            background-color: #f8f9fa;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .modal-content {
            border-radius: 1rem;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
            border: none;
        }

        .card-content {
            padding: 3rem 2rem;
            text-align: center;
        }

        .fas.fa-envelope {
            color: #fff;
            font-size: 2rem;
            background: linear-gradient(90deg, #ff9966, #ff5e62);
            padding: 1.5rem;
            border-radius: 100%;
            margin: 0 0 1.5rem 0;
            box-shadow: 0 5px 15px rgba(255, 94, 98, 0.3);
        }

        .card-content h1 {
            text-transform: uppercase;
            margin: 0 0 1rem 0;
            font-weight: 700;
            color: #333;
        }

        .card-content p {
            font-size: 1rem;
            margin: 0 0 2rem 0;
            color: #666;
            line-height: 1.6;
        }

        .form-input {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 1.5rem;
        }

        input {
            padding: 0.8rem 1.5rem;
            width: 60%;
            border-radius: 5rem;
            outline: none;
            border: 1px solid #ddd;
            font-size: 0.9rem;
            transition: all 0.3s;
        }

        input:focus {
            border-color: #ff9966;
            box-shadow: 0 0 0 0.25rem rgba(255, 153, 102, 0.25);
        }

        ::placeholder {
            color: #aaa;
        }

        .subscribe-btn {
            padding: 0.8rem 1.8rem;
            border-radius: 5rem;
            background: linear-gradient(90deg, #ff9966, #ff5e62);
            color: #fff;
            font-size: 0.9rem;
            border: none;
            outline: none;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 600;
        }

        .subscribe-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255, 94, 98, 0.4);
        }

        .trigger-btn {
            background: linear-gradient(90deg, #ff9966, #ff5e62);
            border: none;
            border-radius: 5rem;
            padding: 0.8rem 1.8rem;
            font-weight: 600;
            box-shadow: 0 5px 15px rgba(255, 94, 98, 0.3);
            transition: all 0.3s;
        }

        .trigger-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(255, 94, 98, 0.4);
        }

        .modal-backdrop {
            background-color: rgba(0, 0, 0, 0.5);
        }

        @media (max-width: 576px) {
            .form-input {
                flex-direction: column;
                align-items: center;
            }

            input {
                width: 100%;
                margin-bottom: 10px;
            }

            .card-content {
                padding: 2rem 1.5rem;
            }
        }
    </style>
</head>
<body>

    <!-- Subscribe Button -->
    <button
        type="button"
        class="btn trigger-btn d-flex align-items-center gap-2 px-4 py-3 rounded-pill shadow"
        data-bs-toggle="modal"
        data-bs-target="#emailModal"
    >
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" class="bi bi-envelope-fill" viewBox="0 0 16 16">
            <path d="M.05 3.555A2 2 0 0 1 2 2h12a2 2 0 0 1 1.95 1.555L8 8.414.05 3.555zM0 4.697v7.104l5.803-3.808L0 4.697zM6.761 8.83l-6.66 4.373A2 2 0 0 0 2 14h12a2 2 0 0 0 1.899-1.197l-6.66-4.373L8 9.586l-1.239-.757zM16 4.697l-5.803 3.296L16 11.801V4.697z"/>
        </svg>
        <span style="font-weight: 500; font-size: 1.1rem;">Subscribe</span>
    </button>

    <!-- Modal -->
    <div class="modal fade" id="emailModal" tabindex="-1" aria-labelledby="emailModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content rounded-4 shadow-lg border-0">
                <div class="modal-header border-0" style="position: absolute; right: 0; z-index: 1;">
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="wrapper">
                    <form action="#" class="card-content">
                        <div class="container">
                            <div class="image">
                                <i class="fas fa-envelope"></i>
                            </div>
                            <h1>Subscribe</h1>
                            <p>Subscribe to our newsletter and never miss an update!</p>
                        </div>
                        <div class="form-input">
                            <label for="email" class="visually-hidden">Email Address</label>
                            <input type="email" id="email" placeholder="Your Email Address" required>
                            <button type="submit" class="subscribe-btn">Subscribe</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap & jQuery JS -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        $(document).ready(function() {
            // Show modal on page load after 1 second
            setTimeout(function() {
                $('#emailModal').modal('show');
            }, 1000);

            // Form submission handling
            $('form').on('submit', function(e) {
                e.preventDefault();
                const email = $('#email').val();

                if (email && isValidEmail(email)) {
                    // Here you would typically send the data to your server
                    alert('Thank you for subscribing with: ' + email);
                    $('#emailModal').modal('hide');
                } else {
                    alert('Please enter a valid email address');
                }
            });

            function isValidEmail(email) {
                const re = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
                return re.test(email);
            }
        });
    </script>

</body>
</html>
